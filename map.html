<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BLACKLACE HOLO MAP</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="phase-signal map-body">
  <div class="bg-orb"></div>
  <div class="aurora-layer"></div>
  <div class="noise"></div>
  <div class="scanlines"></div>

  <main class="map-page">
    <header class="topbar map-topbar">
      <a class="brand" href="index.html"><span class="brand-eye">◉</span><span>BLACKLACE</span></a>
      <div class="top-actions">
        <a class="aloisia-button" href="aloisia.html">ALOISIA</a>
        <a class="map-button compact" href="index.html">LIVE ACCESS</a>
      </div>
    </header>

    <section class="holo-map-stage tilt-card">
      <div class="map-title-block">
        <p class="section-kicker">HOLOGRAPHIC MAP</p>
        <h1>Blacklace Island</h1>
        <p>Carte locale branchée sur <code>assets/img/island-map.png</code>. Les points deviendront les accès vivants de l’île.</p>
      </div>

      <div class="map-core local-map">
        <img src="assets/img/island-map.png" alt="Carte de Blacklace Island" />
        <button class="hotspot rotas" title="Rotas Village"><span>Rotas</span></button>
        <button class="hotspot feuch" title="Fournaise de Feuch"><span>Feuch</span></button>
        <button class="hotspot port" title="Porsa Rotas"><span>Port</span></button>
        <button class="hotspot aloisia-spot" title="Aloisia Core"><span>Aloisia</span></button>
      </div>
    </section>
  </main>
</body>
</html>
